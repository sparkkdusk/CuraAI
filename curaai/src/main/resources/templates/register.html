<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CuraAI | Get Started</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen bg-[#FAF4EC] flex items-center justify-center">

<div class="bg-white w-[450px] rounded-3xl shadow-xl p-10">

    <h1 class="text-3xl font-bold text-[#2B1F14]" style="font-family:Playfair Display">
        Create CuraAI Account
    </h1>

    <p class="text-[#9A7A60] mt-2 mb-8">
        Start tracking your health intelligently
    </p>

    <p th:if="${error}" th:text="${error}" class="text-red-600 text-sm mb-4"></p>

    <form th:action="@{/auth/register}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <input
                name="fullName"
                class="w-full p-3 mb-4 rounded-xl border"
                placeholder="Full Name"
                required>

        <input
                name="email"
                type="email"
                class="w-full p-3 mb-4 rounded-xl border"
                placeholder="Email"
                required>

        <input
                name="password"
                class="w-full p-3 mb-6 rounded-xl border"
                placeholder="Password"
                type="password"
                required>

        <button
                type="submit"
                class="w-full bg-[#5C3D22] text-white py-3 rounded-xl font-semibold">
            Get Started
        </button>

    </form>

    <p class="text-center mt-6 text-sm text-[#9A7A60]">
        Already have an account?
        <a th:href="@{/auth/login}" class="text-[#8B5E3C] font-semibold">
            Sign In
        </a>
    </p>

</div>

</body>
</html>
